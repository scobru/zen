name: install-smoke

# Answers: "how do we know the README install one-liner works for new users?"
# This job runs the exact same install command documented in README and
# verifies the relay starts and serves /zen.js over HTTP.

on:
  push:
    branches: [main]
    paths:
      - "script/install.sh"
      - "script/zen.sh"
      - "relay.js"
      - "lib/server.js"
      - ".github/workflows/install.yml"
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Run the exact one-liner from README.
      # --skip-service: systemd is unavailable in GitHub Actions runners.
      # Node.js 24 is installed by the script via nodesource if < 24 is found.
      - name: Install ZEN (README one-liner, skip systemd)
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/script/install.sh) \
            --skip-service \
            --dir "$HOME/zen"

      - name: Verify zen CLI is installed and callable
        run: |
          # The CLI lands in ~/.local/bin/zen (non-root) or /usr/local/bin/zen (root)
          ZEN_CLI=""
          [[ -x "$HOME/.local/bin/zen" ]] && ZEN_CLI="$HOME/.local/bin/zen"
          [[ -x "/usr/local/bin/zen"   ]] && ZEN_CLI="/usr/local/bin/zen"
          if [[ -z "$ZEN_CLI" ]]; then
            echo "FAIL: zen CLI not found in ~/.local/bin or /usr/local/bin"
            exit 1
          fi
          echo "zen CLI: $ZEN_CLI"
          "$ZEN_CLI" status

      - name: Start relay
        run: |
          PORT=8420 node "$HOME/zen/relay.js" &
          echo $! > /tmp/zen.pid
          # wait up to 15s for the relay to bind the port
          for i in $(seq 1 15); do
            curl -sf http://localhost:8420/zen.js >/dev/null 2>&1 && break
            echo "  waiting ($i/15)…"; sleep 1
          done

      - name: Relay serves /zen.js (HTTP 200)
        run: |
          STATUS=$(curl -o /dev/null -s -w '%{http_code}' http://localhost:8420/zen.js)
          echo "HTTP $STATUS"
          [[ "$STATUS" == "200" ]] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "OK"

      - name: zen.js content is non-empty JS
        run: |
          BYTES=$(curl -sf http://localhost:8420/zen.js | wc -c)
          echo "zen.js size: ${BYTES} bytes"
          [[ "$BYTES" -gt 10000 ]] || { echo "FAIL: zen.js too small (${BYTES} bytes)"; exit 1; }
          echo "OK"

      - name: Stop relay
        if: always()
        run: kill "$(cat /tmp/zen.pid 2>/dev/null)" 2>/dev/null || true
