name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # checkout the code
      - name: Checkout
        uses: actions/checkout@v4

      # verify the version in package.json matches the release tag (Linux only — uses bash)
      - name: Version
        if: runner.os == 'Linux'
        uses: tcurdt/action-verify-version-npm@master

      # setup the node version
      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # cache node_modules if we can
      - name: Cache
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ matrix.node-version }}-${{ runner.os }}-build-${{ hashFiles('package.json') }}

      # otherwise run install
      - name: Install
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm install

      # run tests
      - name: Test
        run: npm test

  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Cache
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: 24.x-${{ runner.os }}-build-${{ hashFiles('package.json') }}

      - name: Install
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm install

      - name: Build ZEN
        run: npm run buildZEN

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Browser tests
        run: npm run test:browser

  # create github release
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # create github release (which triggers the release workflows)
      - name: Release
