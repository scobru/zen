<script src="../zen.js"></script>
<script>
  (function () {
    //localStorage.clear();

    var zen = (window.zen = Zen("http://localhost:8420/zen"));
    var user = (window.user = zen.get("pub/alice"));
    return;
    user.put({ pub: "alice" }, write);

    function write(data) {
      console.log("write...");
      user
        .get("profile")
        .get("said")
        .set(
          {
            what: "Hello world! " + Zen.text.random(3),
          },
          get,
        );
    }

    function get() {
      console.log("get...");
      user
        .get("profile")
        .get("said")
        .map()
        .val(function (data) {
          console.log("read...", data);
        });
    }
  })();
</script>
