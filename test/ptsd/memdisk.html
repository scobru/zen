<script src="../zen.js"></script>
<script>
  var zen = Zen({ localStorage: false, WebSocket: false });
  var c = 100000,
    big = "big";
  while (--c) {
    big += "big";
  }
  c = 0;
  window.STOP = false;
  var to = setInterval(function () {
    if (window.STOP) {
      clearTimeout(to);
      return;
    }
    var i = 10;
    while (--i) {
      it(i);
    }
    console.log(Object.keys(zen._.graph).length); //, 'item in memory graph:', Object.keys(zen._.graph));
    //return;
    var mem = console.memory;
    console.log(
      ((mem.usedJSHeapSize / mem.totalJSHeapSize) * 100).toFixed(0) +
        "% memory",
    );
  }, 2);

  function it(i) {
    c++;
    var key = Zen.text.random(5);
    zen.get(key).put({ data: big });
    setTimeout(function () {
      zen.get(key).off();
    }, 1);
  }
</script>
