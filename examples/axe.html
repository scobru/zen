<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1.0"
    />
    <title>Testing AXE</title>
  </head>

  <body>
    <h3 id="pid"></h3>
    <script type="module" src="/zen.js"></script>
    <script type="module" src="../lib/axe.js"></script>
    <script type="module" src="../lib/webrtc.js"></script>
    <script type="module">
      import ZEN from "/zen.js";

      var pid = location.hash.slice(1);
      var opt = { peers: [location.origin + "/zen"] };
      if (pid) opt.pid = pid;

      ZEN.on("opt", function (ctx) {
        this.to.next(ctx);
        ctx.on("hi", function () {
          setTimeout(function () {
            document.getElementById("pid").innerHTML = zen._.opt.pid;
          });
        });
      });

      var zen = new ZEN(opt);
    </script>
  </body>
</html>
