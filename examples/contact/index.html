<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" type="text/css" href="../style.css">
	</head>
	<body>
		<div id="sign" class="hue page">
			<style>
				input, button {
					margin: 1em 0;
					padding: 1em;
				}
				.or {
					display: inline-block;
					width: 15%;
				}
			</style>
			<form id="inup" class="sign pad center">
				<div class="loud">Welcome,</div>
				<div class="mid row col">
					<input name="alias" class="huet jot sap" placeholder="alias">
					Enter your public username.
				</div>
				<div class="mid row col">
					<input name="pass" class="huet jot sap" type="password" placeholder="passphrase">
					And a long private passphrase.
				</div>
				<div class="mid row col go">
					<button class="huet sap act symbol">sign in</button>
					<div class="or">or</div>
					<button class="huet sap act symbol">sign up</button>
				</div>
				<a href="info">more info</a>
			</form>
		</div id="sign">
		
		<div id="people" class="hue2 page">
			<ul name="users" class="pad">
				<h3>Here is a list of people:</h3>
				<li name="#">
					<!-- <h3 name="."></h3> -->
					<ul>
						<a href="person" name="#" class="whitet act">
							<li>
								<span name="who">
									<b name="name"></b>
								</span>
								<i>~</i><i name="alias" class="sort"></i>
								<input name="pub">
							</li>
						</a>
					</ul>
				</li>
			</ul>
		</div id="people">
		
		<div id="converse" class="page">
			<ul>
			</ul>
			<div class="model">
				<li class="msg">
					<span name="fro">Alias</span>: <span name="what"></span>
				</li>
			</div>
			<form>
				<input placeholder="to" name="to">
				<textarea name="what"></textarea>
				<input type="submit" value="submit">
				<div class="status"></div>
			</form>
		</div id="converse">
		
		<div id="person" class="hue3 page">
			<style>
				#person .back {
					position: absolute;
					top: 0.3em;
					left: 0.5em;
					width: 2em;
					height: 2em;
					z-index: 99999;
				}
			</style>
			<a href="people" class="whitet act back">&#8592</a>
			<div class="pad">
				<div name="who">
					<!-- img src="" -->
					<h2 name="name" contenteditable="true">Name</h2>
					<i name="born"></i>
					<span name="bio" contenteditable="true">bio</span>
					<form id="say" class="center none">
						<input class="jot" placeholder="Say something!" style="width: 80%;">
						<input type="submit" id="speak" class="huet2 sap act symbol" style="min-width: 5em; width: 10%;" value="speak">
					</form>
					<div>
						<ul name="said">
							<li name="#" class="sit sort shade rim"><div name="what" class="rim"></div></li>
						</ul>
					</div>
				</div>
				<input name="pub">
			</div>
		</div id="person">

		<div id="info" class="page">
			<p>A mysterious new example app has appeared! It is not finished/ready yet.</p>
		</div id="info">
		
		<div id="tell" class="center">
			<style>
				#tell {
					position: fixed;
					top: 0;
					left: 0;
					right: 0;
					height: 0;
					overflow: visible;
				}
				#tell p {
					top: -2em;
					width: 50%;
					border: solid #222 0.2em;
					border-top: none;
					padding: 1%;
					opacity: 0;
					visibility: hidden;
					transition: visibility 2s, all 1s ease-in;
				}
				#tell .notify {
					top: 0em;
					opacity: 0.8;
					visibility: visible;
					transition: visibility 0s, all 0.25s ease-out;
				}
			</style>
			<p class="mid black">Hello world!</p>
		</div>

		<!-- script src="/Users/mark/Dropbox/Public/zen/db/examples/jquery.js"></script>
		<script src="/zen.js"></script>
		<script src="/Users/mark/Dropbox/Public/zen/db/sea.js"></script>
		<script src="/Users/mark/Dropbox/Public/zen/db/as.js"></script -->

		<script src="/jquery.js"></script>
		<script src="/zen.js"></script>
		<script src="/zen/sea.js"></script>
		<script src="/zen/as.js"></script>
		<script src="/zen/nts.js"></script>
		<script>
			var zen = ZEN(location.origin + '/zen');
			var app = zen.get('example/contacts/7');
			var c = window.c = {};

			(function(){
				c.hash = location.hash.slice(1);
				if(!window.sessionStorage){ window.sessionStorage = {clear:function(){}} }
				if(!location.hash){ as.route('sign'); }

				c.tell = function(what, n){
					var e = $('#tell').find('p');
					e.addClass('notify').text(what);
					clearTimeout(c.tell.to);
					c.tell.to = setTimeout(function(){ e.removeClass('notify') }, n || 2500);
				};

				// Prefill alias from last session
				var savedAlias = localStorage.getItem('zen_alias');
				if(savedAlias){ $('input[name=alias]').val(savedAlias); }

				// Sign up
				$(document).on('click','form.sign button:last', function(){
					var but = $(this), form = $(this).closest('form');
					var alias = form.find('input[name=alias]').val();
					var pass = form.find('input[name=pass]').val();
					if(!alias || alias.length < 5){ c.tell('Alias needs to be longer than 5 characters.'); return; }
					if(!pass || pass.length < 9){ c.tell('Passphrase needs to be longer than 9 characters.'); return; }
					but.addClass('pulse');
					alias = alias.toLowerCase();
					ZEN.pair().then(function(pair){
						return ZEN.encrypt(JSON.stringify(pair), pass).then(function(enc){
							but.removeClass('pulse');
							localStorage.setItem('zen_enc', enc);
							localStorage.setItem('zen_alias', alias);
							c.me = { pair: pair, alias: alias, pub: pair.pub };
							zen.get('~' + pair.pub).get('name').put(alias, null, { authenticator: pair });
							zen.get('~' + pair.pub).get('pub').put(pair.pub, null, { authenticator: pair });
							app.get('users').get(alias).put({ pub: pair.pub });
							as.route('people');
						});
					}).catch(function(){ but.removeClass('pulse'); c.tell('Failed to create identity.'); });
				});

				// Sign in
				$(document).on('click','form.sign button:first', function(){
					var but = $(this), form = $('#sign').find('form');
					var alias = form.find('input[name=alias]').val().toLowerCase();
					var pass = form.find('input[name=pass]').val();
					if(!alias || alias.length < 5){ c.tell('Alias needs to be longer than 5 characters.'); return; }
					if(!pass || pass.length < 9){ c.tell('Passphrase needs to be longer than 9 characters.'); return; }
					var enc = localStorage.getItem('zen_enc');
					if(!enc){ c.tell('No account found on this device.'); return; }
					but.addClass('pulse');
					ZEN.decrypt(enc, pass).then(function(dec){
						but.removeClass('pulse');
						if(!dec){ c.tell('Wrong passphrase.'); return; }
						try {
							var pair = JSON.parse(dec);
							c.me = { pair: pair, alias: alias, pub: pair.pub };
							as.route(c.hash && 'sign' !== c.hash ? c.hash : 'people');
						} catch(e){ c.tell('Corrupted account data.'); }
					}).catch(function(){ but.removeClass('pulse'); c.tell('Wrong passphrase.'); });
				});
			}());

			(function(){
				$(document).on('submit', '#say', function(e){
					e.preventDefault();
					if(!c.me){ return; }
					zen.get('~' + c.me.pub).get('who').get('said').set(
						{ what: $(this).find('.jot').val() },
						null,
						{ authenticator: c.me.pair }
					);
					$(this).find('.jot').val('');
				});
			}());

			as.route.page('sign', function(){
				$(document.forms.inup.alias).focus();
			});

			as.route.page('people', function(){
				if(!c.me){ return as.route('sign'); }
				as('#people', app.get('users'), function(data, key, el){
					if('pub' !== key){ return; }
					el.closest('a').attr('href', '#person/' + data);
				});
			});

			as.route.page('person', function(){
				if(!c.me){ return as.route('sign'); }
				var pub = location.hash.split('/').slice(-1)[0];
				(pub === c.me.pub ? $('#say').show() : $('#say').hide());
				as('#person', window.PUB = zen.get('~' + pub));
			});
		</script>
	</body>
</html>
